<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hệ thống AI Agent sản xuất nội dung Facebook cho thương hiệu Đậu Ánh">
    <title>Đậu Ánh - AI Content Agent | Facebook Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">🫘</div>
                <div class="brand-text">
                    <h1>ĐẬU ÁNH</h1>
                    <span class="brand-subtitle">AI Content Agent</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" id="nav-dashboard" data-page="dashboard">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Tổng quan</span>
                </a>
                <a href="#create" class="nav-item" id="nav-create" data-page="create">
                    <span class="nav-icon">✏️</span>
                    <span class="nav-text">Tạo bài viết</span>
                </a>
                <a href="#posts" class="nav-item" id="nav-posts" data-page="posts">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Quản lý bài viết</span>
                </a>
                <a href="#analytics" class="nav-item" id="nav-analytics" data-page="analytics">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Thống kê</span>
                </a>
                <a href="#settings" class="nav-item" id="nav-settings" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Kết nối API</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Đang kết nối...</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="menu-toggle" id="menu-toggle">☰</button>
                    <div class="page-title" id="page-title">Tổng quan</div>
                </div>
                <div class="top-bar-right">
                    <div class="current-time" id="current-time"></div>
                    <div class="page-info-badge" id="page-info-badge">
                        <img src="" alt="" id="page-avatar" class="page-avatar">
                        <span id="page-name-display">Loading...</span>
                    </div>
                </div>
            </header>

            <div class="main-content" id="main-content">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>
    
    <!-- Modal Container -->
    <div class="modal-overlay" id="modal-container">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script src="js/templates.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
