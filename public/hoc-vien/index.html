<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tự Do Thịnh Vượng - Đậu Ánh AI | Kho Mật Mã</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/hoc-vien/" class="logo"><span class="logo-mark">ĐA</span><span>Tự Do Thịnh Vượng</span></a>
      <div class="header-actions" id="header-actions">
        <a href="/hoc-vien/dashboard.html" class="btn btn-outline btn-sm" id="dashboard-link" style="display:none">Bài giảng của tôi</a>
        <button class="btn btn-outline btn-sm" id="logout-btn" style="display:none">Đăng xuất</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <h1>Kho Mật Mã</h1>
      <p>Chọn mật mã bạn muốn mở khoá. Thanh toán qua chuyển khoản ngân hàng, admin xác nhận trong vài giờ.</p>
    </div>

    <div class="card" id="auth-card" style="max-width:420px; margin-bottom:36px">
      <div class="tabs">
        <button data-tab="login" class="active">Đăng nhập</button>
        <button data-tab="register">Đăng ký</button>
      </div>

      <form class="tab-panel active" id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="ban@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Đăng Nhập</button>
      </form>

      <form class="tab-panel" id="register-form">
        <div class="form-group">
          <label class="form-label">Họ và tên</label>
          <input type="text" name="fullName" class="form-control" required placeholder="Nguyễn Văn A">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="ban@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control" required minlength="6" placeholder="Tối thiểu 6 ký tự">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Tạo Tài Khoản</button>
      </form>
    </div>

    <div class="card" id="welcome-card" style="display:none; max-width:420px; margin-bottom:36px">
      <p style="margin-bottom:12px">Xin chào, <strong id="welcome-email"></strong> 👋</p>
      <a href="/hoc-vien/dashboard.html" class="btn btn-primary btn-block">Vào trang Bài giảng của tôi</a>
    </div>

    <div class="grid grid-cards" id="course-grid">
      <div class="empty-state">Đang tải khoá học...</div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <!-- Modal hướng dẫn chuyển khoản -->
  <div id="order-modal" style="display:none; position:fixed; inset:0; background:rgba(4,3,1,.7); z-index:100; align-items:center; justify-content:center; padding:20px">
    <div class="card" style="max-width:420px; width:100%">
      <h3 style="font-family:var(--font-display); font-size:19px; margin-bottom:14px">Hướng dẫn chuyển khoản</h3>
      <div class="order-note" id="order-note"></div>
      <button class="btn btn-outline btn-block" id="order-modal-close" style="margin-top:16px">Đóng</button>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
